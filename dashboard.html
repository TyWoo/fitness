<!DOCTYPE html>
<!-- v3 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Iron Atlas · Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- No Babel, no JSX — htm + Preact (~4KB total) -->
  <script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0a0a0a; color: #e8e8e8; -webkit-font-smoothing: antialiased; }
    body { font-family: 'IBM Plex Mono', monospace; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .bebas { font-family: 'Bebas Neue', cursive; }

    /* Layout */
    .screen { padding: 16px 16px 100px; }
    .section { margin-bottom: 24px; }
    .section-label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 11px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; }
    .section-label-dot { color: #e8501a; }
    .section-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 3px; border: 1px solid #262626; color: #555; }
    .section-badge.live { border-color: #14532d; color: #16a34a; background: #052e16; }
    .section-badge.partial { border-color: #422006; color: #92400e; background: #1c0a00; }

    /* Cards */
    .card { background: #141414; border: 1px solid #222; border-radius: 3px; }
    .card-p { padding: 16px; }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .stat-card { background: #141414; border: 1px solid #222; border-radius: 3px; padding: 12px; }
    .stat-val { font-family: 'Bebas Neue', cursive; font-size: 36px; line-height: 1; color: #fff; }
    .stat-val.accent { color: #e8501a; }
    .stat-label { font-size: 10px; color: #555; margin-top: 4px; }
    .stat-sub { font-size: 10px; color: #3a3a3a; margin-top: 2px; }

    /* Badge */
    .badge { font-size: 10px; font-family: 'IBM Plex Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }

    /* Bottom nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #141414; border-top: 1px solid #222; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px); display: grid; grid-template-columns: repeat(5, 1fr); }
    .nav-btn { padding: 12px 0; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; color: #444; transition: color 0.15s; }
    .nav-btn.active { color: #e8501a; }
    .nav-icon { font-size: 16px; line-height: 1; }
    .nav-label { font-size: 9px; letter-spacing: 0.04em; font-family: 'IBM Plex Mono', monospace; }

    /* Muscle bars */
    .muscle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .muscle-name { font-size: 10px; color: #555; width: 76px; flex-shrink: 0; text-transform: uppercase; }
    .muscle-bar-bg { flex: 1; background: #1a1a1a; border-radius: 2px; height: 20px; overflow: hidden; }
    .muscle-bar-fill { height: 100%; border-radius: 2px; display: flex; align-items: center; padding-left: 8px; transition: width 0.5s; }
    .muscle-bar-num { font-size: 10px; font-weight: 700; color: #fff; }

    /* Surf legend */
    .chart-legend { display: flex; gap: 16px; margin-top: 8px; font-size: 10px; color: #444; }

    /* History */
    .session-card { margin-bottom: 8px; border: 1px solid #222; border-radius: 3px; overflow: hidden; background: #141414; }
    .session-header { padding: 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
    .session-body { border-top: 1px solid #1a1a1a; }
    .session-ex { padding: 10px 16px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 8px; }
    .session-ex:last-child { border-bottom: none; }
    .ex-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ex-name { font-size: 11px; color: #ccc; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ex-sets { font-size: 11px; color: #555; flex-shrink: 0; }

    /* Filter chips */
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; }
    .filter-chip { font-size: 10px; font-family: 'IBM Plex Mono', monospace; padding: 6px 12px; border-radius: 3px; border: 1px solid #222; color: #555; background: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .filter-chip.active { border-color: #e8501a; color: #e8501a; }

    /* Pending card */
    .pending-card { background: #141414; border: 1px solid #222; border-radius: 3px; padding: 16px; margin-bottom: 12px; }
    .pending-title { font-family: 'Bebas Neue', cursive; font-size: 20px; color: #444; margin-bottom: 4px; }
    .pending-desc { font-size: 11px; color: #3a3a3a; line-height: 1.6; margin-bottom: 12px; }
    .pending-badge { font-size: 10px; color: #333; border: 1px solid #222; padding: 2px 8px; border-radius: 3px; }
    .pending-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pending-metric { border: 1px solid #1a1a1a; border-radius: 3px; padding: 8px; }
    .pending-metric-label { font-size: 10px; color: #2a2a2a; }
    .pending-metric-val { font-family: 'Bebas Neue', cursive; font-size: 22px; color: #222; }

    /* Body comp measurements */
    .meas-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .meas-label { font-size: 11px; color: #555; width: 52px; flex-shrink: 0; }
    .meas-bar-bg { flex: 1; background: #1a1a1a; border-radius: 3px; height: 6px; overflow: hidden; }
    .meas-bar-fill { height: 100%; border-radius: 3px; }
    .meas-val { font-size: 12px; color: #e8e8e8; text-align: right; }
    .meas-delta { font-size: 10px; color: #555; margin-left: 6px; }

    /* Target card */
    .target-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
    .target-row:last-child { margin-bottom: 0; }
    .target-key { color: #555; }
    .target-val { color: #e8e8e8; }
    .target-val.accent { color: #e8501a; }

    /* Lift card */
    .lift-card { background: #141414; border: 1px solid #222; border-radius: 3px; padding: 16px; margin-bottom: 12px; }
    .lift-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .lift-last { font-size: 11px; color: #555; margin-top: 4px; }
    .lift-pr-label { font-size: 10px; color: #555; }
    .lift-pr-val { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 18px; color: #fff; }
    .lift-pr-unit { font-size: 11px; color: #444; }
    .lift-trend { font-size: 11px; margin-top: 2px; }
    .lift-history-row { display: flex; justify-content: space-between; font-size: 10px; color: #333; margin-top: 8px; }

    /* Loading */
    .loading-screen { position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .loading-title { font-family: 'Bebas Neue', cursive; font-size: 56px; color: #e8501a; letter-spacing: 0.1em; }
    .loading-sub { font-size: 11px; color: #333; letter-spacing: 0.15em; }
    .loading-bar-bg { width: 140px; height: 1px; background: #1a1a1a; }
    .loading-bar-fill { height: 100%; background: #e8501a; width: 60%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* Header */
    .header { position: sticky; top: 0; z-index: 40; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-family: 'Bebas Neue', cursive; font-size: 22px; color: #e8501a; letter-spacing: 0.1em; }
    .header-date { font-size: 11px; color: #444; }

    /* Error */
    .error-banner { margin: 12px 16px; padding: 12px; border: 1px solid #7f1d1d; border-radius: 3px; font-size: 11px; color: #f87171; }

    /* Empty */
    .empty-state { text-align: center; padding: 40px 0; font-size: 11px; color: #333; letter-spacing: 0.1em; }

    /* Load card */
    .load-card-inner { display: flex; align-items: center; justify-content: space-between; }
    .load-vs { font-size: 10px; color: #444; margin-bottom: 4px; }
    .load-val { font-family: 'Bebas Neue', cursive; font-size: 36px; }
    .load-label { font-size: 11px; margin-top: 2px; }
    .load-pending { text-align: right; font-size: 10px; color: #2a2a2a; line-height: 1.8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // ── Globals ──────────────────────────────────────────────────
    const { h, render, Component } = preact;
    const { useState, useEffect, useRef, useMemo } = preactHooks;
    const html = htm.bind(h);
    const { createClient } = supabase;

    // ── Config ───────────────────────────────────────────────────
    const SB_URL  = 'https://wnwkraukvizulycjssyk.supabase.co';
    const SB_KEY  = 'sb_publishable__XnF9a593J_CgLzof3k-Mw_AA-jKpl6';
    const GFIT_CLIENT_ID = '504998493217-ec3nhhfh1nv8tqq9dvch99nnhanlsscr.apps.googleusercontent.com';
    const GFIT_SCOPES = [
      'https://www.googleapis.com/auth/fitness.activity.read',
      'https://www.googleapis.com/auth/fitness.heart_rate.read',
    ].join(' ');
    const ATHLETE_BW    = 220;
    const TARGET_WEIGHT = 190;
    const TARGET_BF     = 11;
    const sb = createClient(SB_URL, SB_KEY);

    // ── Mappings ─────────────────────────────────────────────────
    const MUSCLE_MAP = {
      squat:'Quads', front_squat:'Quads', bss:'Quads', mk_squat:'Quads',
      mk_bss:'Quads', walk_lunge:'Quads', pistol:'Quads',
      rdl:'Hamstrings', mk_rdl:'Hamstrings', nordic:'Hamstrings',
      hip_thrust:'Glutes',
      sl_calf:'Calves', calf_raise:'Calves',
      depth_drop:'Plyos', broad_jump:'Plyos', sl_hop:'Plyos', box_jump:'Plyos', mk_box:'Plyos',
      bench:'Chest', mk_bench:'Chest', dips:'Chest', mk_dips:'Chest',
      ohp:'Shoulders', mk_ohp:'Shoulders', face_pull:'Shoulders', band_pull:'Shoulders',
      row:'Back', pullup:'Back', lat_pd:'Back',
      curl:'Biceps',
      hollow:'Core', mk_hollow:'Core', pallof:'Core', mk_pallof:'Core', mk_abwheel:'Core',
      kb_swing:'Conditioning',
      row_z2:'Cardio',
      foam:'Recovery', squat_hold:'Recovery', pigeon:'Recovery',
      thor_rot:'Recovery', couch:'Recovery', ham_floss:'Recovery',
      ankle_df:'Recovery', bosu_bal:'Recovery', ankle_mob:'Recovery',
    };
    const MUSCLE_COLORS = {
      Quads:'#e8501a', Chest:'#c43d0e', Back:'#4a90d9',
      Hamstrings:'#e8a01a', Glutes:'#c45c1a', Shoulders:'#9b59b6',
      Calves:'#666', Biceps:'#27ae60', Core:'#16a085',
      Plyos:'#f39c12', Conditioning:'#e74c3c', Cardio:'#3498db', Recovery:'#2a2a2a',
    };
    const KEY_LIFTS = [
      { id:'squat',  aliases:['squat','mk_squat'],   name:'Back Squat',      color:'#e8501a' },
      { id:'bench',  aliases:['bench','mk_bench'],   name:'Bench Press',     color:'#4a90d9' },
      { id:'rdl',    aliases:['rdl','mk_rdl'],       name:'Romanian DL',     color:'#e8a01a' },
      { id:'ohp',    aliases:['ohp','mk_ohp'],       name:'Overhead Press',  color:'#9b59b6' },
      { id:'row',    aliases:['row'],                 name:'Barbell Row',     color:'#27ae60' },
      { id:'pullup', aliases:['pullup'],              name:'Pull-ups',        color:'#16a085' },
    ];
    const TABS = [
      { id:'overview', label:'OVERVIEW', icon:'⊞' },
      { id:'strength', label:'STRENGTH', icon:'↑' },
      { id:'body',     label:'BODY',     icon:'◎' },
      { id:'cardio',   label:'CARDIO',   icon:'♡' },
      { id:'history',  label:'HISTORY',  icon:'◷' },
    ];

    // ── Data utils ───────────────────────────────────────────────
    function getMuscleGroup(id) {
      if (!id) return 'Other';
      if (MUSCLE_MAP[id]) return MUSCLE_MAP[id];
      const bare = id.replace(/^mk_/, '');
      for (const [k, v] of Object.entries(MUSCLE_MAP)) {
        if (k === bare || id.includes(k)) return v;
      }
      return 'Other';
    }

    function e1rm(weight, repsRaw) {
      const r = parseInt(repsRaw) || 0;
      if (!weight || r <= 0) return 0;
      return r === 1 ? weight : Math.round(weight * (1 + r / 30));
    }

    function parseExs(raw) {
      if (!raw) return [];
      const arr = Array.isArray(raw) ? raw : Object.values(raw);
      return arr.map(ex => ({
        id:   ex.id   || '',
        name: ex.name || 'Unknown',
        sets: (ex.sets || []).filter(s => s.logged !== false),
      }));
    }

    function localD(s) { return (s || '').slice(0, 10); }

    function weekBounds(offset = 0) {
      const now = new Date();
      const dow = now.getDay();
      const mon = new Date(now);
      mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) - offset * 7);
      mon.setHours(0, 0, 0, 0);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      sun.setHours(23, 59, 59, 999);
      return { start: mon, end: sun };
    }

    function weeklyStats(sessions) {
      const { start, end } = weekBounds(0);
      const week = sessions.filter(s => {
        const d = new Date(localD(s.date_local) + 'T12:00:00');
        return d >= start && d <= end;
      });
      let sets = 0, vol = 0;
      const groups = {};
      week.forEach(s => {
        sets += s.total_sets_logged || 0;
        parseExs(s.exercises).forEach(ex => {
          const g = getMuscleGroup(ex.id);
          groups[g] = (groups[g] || 0) + ex.sets.length;
          ex.sets.forEach(set => {
            if (set.weight && set.reps) vol += set.weight * (parseInt(set.reps) || 1);
          });
        });
      });
      const { start: ps, end: pe } = weekBounds(1);
      const prevSets = sessions
        .filter(s => { const d = new Date(localD(s.date_local) + 'T12:00:00'); return d >= ps && d <= pe; })
        .reduce((a, s) => a + (s.total_sets_logged || 0), 0);
      return {
        days: week.filter(s => !(s.template_id || '').includes('rest')).length,
        sets, vol, groups, delta: sets - prevSets,
      };
    }

    function surfData(sessions, days = 21) {
      const today = new Date();
      return Array.from({ length: days }, (_, i) => {
        const d = new Date(today);
        d.setDate(today.getDate() - (days - 1 - i));
        const ds = d.toISOString().slice(0, 10);
        const s  = sessions.find(s => localD(s.date_local) === ds);
        return {
          label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
          sets:  s ? (s.total_sets_logged || 0) : 0,
          rdy:   s ? (s.readiness ?? null) : null,
        };
      });
    }

    function liftHistory(sessions, aliases, isPullup) {
      const pts = [];
      sessions.forEach(s => {
        const match = parseExs(s.exercises).find(e => aliases.includes(e.id));
        if (!match) return;
        let best = { e: 0, w: 0, r: '' };
        match.sets.forEach(set => {
          const eff = isPullup ? ATHLETE_BW + (set.weight || 0) : (set.weight || 0);
          const ev  = e1rm(eff, set.reps);
          if (ev > best.e) best = { e: ev, w: eff, r: set.reps };
        });
        if (best.e > 0) pts.push({ date: localD(s.date_local), w: best.w, r: best.r, e: best.e });
      });
      return pts.sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    function rowingSessions(sessions) {
      return sessions
        .filter(s => parseExs(s.exercises).some(e => e.id === 'row_z2'))
        .map(s => ({ date: localD(s.date_local), dur: s.duration_seconds }))
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function fmtDate(d) {
      if (!d) return '';
      return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function fmtDur(s) {
      if (!s) return '—';
      const m = Math.floor(s / 60), hh = Math.floor(m / 60);
      return hh > 0 ? `${hh}h ${m % 60}m` : `${m}m`;
    }
    function fmtVol(lbs) {
      return lbs >= 1000 ? `${(lbs / 1000).toFixed(1)}k` : `${Math.round(lbs)}`;
    }
    function ago(d) {
      if (!d) return '';
      const n = Math.floor((Date.now() - new Date(d + 'T12:00:00')) / 86400000);
      return n === 0 ? 'today' : n === 1 ? '1d ago' : `${n}d ago`;
    }

    // ── Chart.js config ──────────────────────────────────────────
    const CFONT = { family: 'IBM Plex Mono', size: 10 };
    const BASE_OPTS = {
      responsive: true, maintainAspectRatio: false, animation: { duration: 350 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#1c1c1c', borderColor:'#2a2a2a', borderWidth:1,
          titleColor:'#e8e8e8', bodyColor:'#888',
          titleFont:{ family:'IBM Plex Mono', size:11 }, bodyFont: CFONT, padding:10,
        },
      },
      scales: {
        x: { grid:{ color:'#1a1a1a' }, ticks:{ color:'#333', font:CFONT, maxTicksLimit:7 }, border:{ display:false } },
        y: { grid:{ color:'#1a1a1a' }, ticks:{ color:'#333', font:CFONT }, border:{ display:false } },
      },
    };
    function merge(a, b) {
      const o = Object.assign({}, a);
      for (const k in b) {
        if (b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])) o[k] = merge(a[k] || {}, b[k]);
        else o[k] = b[k];
      }
      return o;
    }

    // ── ChartCanvas component ────────────────────────────────────
    function ChartCanvas({ type, data, opts, height }) {
      height = height || 160;
      const ref  = useRef(null);
      const inst = useRef(null);
      const key  = useMemo(() => JSON.stringify({ type, data }), [type, data]);
      useEffect(() => {
        if (!ref.current || !data || !data.labels || !data.labels.length) return;
        if (inst.current) { inst.current.destroy(); inst.current = null; }
        inst.current = new Chart(ref.current, { type, data, options: merge(BASE_OPTS, opts || {}) });
        return () => { if (inst.current) { inst.current.destroy(); inst.current = null; } };
      }, [key]);
      if (!data || !data.labels || !data.labels.length) {
        return html`<div style=${{ height, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'11px', color:'#2a2a2a', letterSpacing:'0.1em' }}>NO DATA YET</div>`;
      }
      return html`<div style=${{ height, position:'relative' }}><canvas ref=${ref}></canvas></div>`;
    }

    // ── Shared UI ────────────────────────────────────────────────
    function Section({ label, badge, children }) {
      return html`
        <div class="section">
          <div class="section-label">
            <span class="section-label-dot">▸</span>
            ${label}
            ${badge && html`<span class="section-badge ${badge === 'LIVE' ? 'live' : badge === 'PARTIAL' ? 'partial' : ''}">${badge}</span>`}
          </div>
          ${children}
        </div>`;
    }

    function StatCard({ label, val, sub, accent }) {
      return html`
        <div class="stat-card">
          <div class="stat-val ${accent ? 'accent' : ''}">${val != null ? val : '—'}</div>
          <div class="stat-label">${label}</div>
          ${sub && html`<div class="stat-sub">${sub}</div>`}
        </div>`;
    }

    function Badge({ children, color }) {
      color = color || '#e8501a';
      return html`<span class="badge" style=${{ background: color + '22', color }}>${children}</span>`;
    }

    function EmptyState({ msg }) {
      return html`<div class="empty-state">${msg || 'NO DATA YET'}</div>`;
    }

    function PendingCard({ title, desc, metrics }) {
      return html`
        <div class="pending-card">
          <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px' }}>
            <div class="pending-title">${title}</div>
            <span class="pending-badge">PENDING CONNECTION</span>
          </div>
          <div class="pending-desc">${desc}</div>
          <div class="pending-grid">
            ${(metrics || []).map(m => html`
              <div class="pending-metric" key=${m.label}>
                <div class="pending-metric-label">${m.label}</div>
                <div class="pending-metric-val">—</div>
              </div>`)}
          </div>
        </div>`;
    }

    // ── OVERVIEW ─────────────────────────────────────────────────
    function OverviewScreen({ sessions }) {
      const stats = useMemo(() => weeklyStats(sessions), [sessions]);
      const surf  = useMemo(() => surfData(sessions, 21),  [sessions]);
      const last  = sessions.find(s => !(s.template_id || '').includes('rest'));
      const avgRdy = useMemo(() => {
        const r = sessions.slice(0, 7).filter(s => s.readiness != null);
        return r.length ? Math.round(r.reduce((a, s) => a + s.readiness, 0) / r.length) : null;
      }, [sessions]);

    // ── POLAR ACCESSLINK ─────────────────────────────────────────
    const POLAR_AUTH_URL = 'https://flow.polar.com/oauth2/authorization';
    const POLAR_CLIENT_ID = 'YOUR_POLAR_CLIENT_ID'; // ← set after Polar developer registration

    function polarConnect() {
      const redirectUri = encodeURIComponent(window.location.origin + '/api/polar-callback');
      window.location.href = `${POLAR_AUTH_URL}?response_type=code&client_id=${POLAR_CLIENT_ID}&redirect_uri=${redirectUri}`;
    }

    async function polarFetch(token, userId) {
      const headers = { Authorization: `Bearer ${token}`, Accept: 'application/json' };
      const base = 'https://www.polaraccesslink.com/v3';

      // Create an exercise transaction to pull new exercises
      const txRes = await fetch(`${base}/users/${userId}/exercise-transactions`, {
        method: 'POST', headers,
      });
      if (txRes.status === 204) return { sessions: [] }; // no new data

      const tx = await txRes.json();
      const txId = tx['transaction-id'];

      // List exercises in this transaction
      const exRes = await fetch(`${base}/users/${userId}/exercise-transactions/${txId}`, { headers });
      const exData = await exRes.json();
      const exerciseUrls = (exData.exercises || []);

      const sessions = [];
      for (const url of exerciseUrls) {
        const exDetailRes = await fetch(url, { headers });
        const ex = await exDetailRes.json();

        // Get HR summary
        const hrRes = await fetch(`${url}/heart-rate`, { headers });
        const hrData = hrRes.ok ? await hrRes.json() : null;

        const dateLocal = (ex['start-time'] || '').slice(0, 10);
        const durMin = ex.duration
          ? Math.round(parseInt(ex.duration.replace(/[^0-9]/g, '')) / 60)
          : null;

        sessions.push({
          date_local:   dateLocal,
          source:       'polar',
          session_name: ex['detailed-sport-info'] || ex['sport-info'] || 'Workout',
          duration_min: durMin,
          avg_hr:       hrData?.average || null,
          max_hr:       hrData?.maximum || null,
          hrv_rmssd:    null, // calculated via Web Bluetooth during workout
        });
      }

      // Commit transaction
      await fetch(`${base}/users/${userId}/exercise-transactions/${txId}`, {
        method: 'DELETE', headers,
      });

      // Upsert to Supabase
      if (sessions.length > 0) {
        await sb.from('cardio_sessions').upsert(sessions, { onConflict: 'date_local,source' });
      }

      return { sessions };
    }

    // ── GOOGLE FIT ───────────────────────────────────────────────
    function gfitConnect(callback) {
      if (typeof google === 'undefined') {
        alert('Google Identity Services not loaded yet — try again in a moment.');
        return;
      }
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GFIT_CLIENT_ID,
        scope: GFIT_SCOPES,
        callback: (resp) => {
          if (resp.error) { console.error('GFit OAuth error:', resp); return; }
          sessionStorage.setItem('gfit_token', resp.access_token);
          callback(resp.access_token);
        },
      });
      client.requestAccessToken();
    }

    async function gfitFetch(token) {
      const endMs   = Date.now();
      const startMs = endMs - 30 * 24 * 60 * 60 * 1000;
      const startISO = new Date(startMs).toISOString();
      const endISO   = new Date(endMs).toISOString();

      // 1. Aggregate daily steps + calories
      const aggRes = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          aggregateBy: [
            { dataTypeName: 'com.google.step_count.delta' },
            { dataTypeName: 'com.google.calories.expended' },
          ],
          bucketByTime: { durationMillis: 86400000 },
          startTimeMillis: startMs,
          endTimeMillis: endMs,
        }),
      });
      const aggJson = await aggRes.json();

      const days = (aggJson.bucket || []).map(b => {
        const dateLabel = new Date(+b.startTimeMillis).toISOString().slice(0, 10);
        let steps = 0, calories = 0;
        for (const ds of b.dataset) {
          for (const p of ds.point) {
            if (ds.dataSourceId.includes('step_count')) steps    += (p.value[0]?.intVal || 0);
            else                                         calories += (p.value[0]?.fpVal  || 0);
          }
        }
        return { date: dateLabel, steps: Math.round(steps), calories: Math.round(calories) };
      }).filter(d => d.steps > 0 || d.calories > 0);

      // 2. Running sessions (activityType=8)
      const sessRes = await fetch(
        `https://www.googleapis.com/fitness/v1/users/me/sessions?startTime=${startISO}&endTime=${endISO}&activityType=8`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const sessJson = await sessRes.json();

      const runs = await Promise.all((sessJson.session || []).map(async s => {
        const sMs = +s.startTimeMillis, eMs = +s.endTimeMillis;
        const durMin = Math.round((eMs - sMs) / 60000);
        const dateLocal = new Date(sMs).toISOString().slice(0, 10);

        // Fetch distance for this session
        const dsRes = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            aggregateBy: [
              { dataTypeName: 'com.google.distance.delta' },
              { dataTypeName: 'com.google.heart_rate.bpm' },
            ],
            startTimeMillis: sMs,
            endTimeMillis: eMs,
          }),
        });
        const dsJson = await dsRes.json();
        let distanceM = 0, avgHr = null;
        for (const b of dsJson.bucket || []) {
          for (const ds of b.dataset) {
            for (const p of ds.point) {
              if (ds.dataSourceId.includes('distance')) distanceM += (p.value[0]?.fpVal || 0);
              else if (ds.dataSourceId.includes('heart_rate')) {
                const vals = p.value.map(v => v.fpVal).filter(Boolean);
                if (vals.length) avgHr = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
              }
            }
          }
        }
        const distKm = distanceM / 1000;
        const avgPaceKm = distKm > 0 ? `${Math.floor(durMin / distKm)}:${String(Math.round((durMin / distKm % 1) * 60)).padStart(2,'0')}` : null;

        return {
          date_local: dateLocal,
          source: 'google_fit',
          session_name: s.name || 'Run',
          duration_min: durMin,
          distance_km: distKm > 0 ? +distKm.toFixed(2) : null,
          avg_pace_km: avgPaceKm,
          avg_hr: avgHr,
        };
      }));

      // 3. Upsert running sessions to Supabase
      if (runs.length > 0) {
        await sb.from('cardio_sessions').upsert(runs, { onConflict: 'date_local,source' });
      }

      return { days, runs };
    }

    // ── CARDIO ───────────────────────────────────────────────────

      const runChartData = useMemo(() => ({

      const rowChartData = useMemo(() => ({

      }), [rowData]);

      const dualYOpts = { ...BASE_OPTS, scales: { ...BASE_OPTS.scales, y2: { position:'right', grid:{ display:false }, ticks:{ color:'#333', font:CFONT } } } };

      const stepsBarOpts = { ...BASE_OPTS, plugins: { ...BASE_OPTS.plugins, legend: { display: false } } };
      const avgSteps7d = gfitData?.days ? Math.round(gfitData.days.slice(-7).reduce((s,d) => s+d.steps, 0) / Math.min(gfitData.days.slice(-7).length, 7)) : null;
      const totalCal7d = gfitData?.days ? Math.round(gfitData.days.slice(-7).reduce((s,d) => s+d.calories, 0)) : null;

      return html`
        <div class="screen">

          <${Section} label="GOOGLE FIT" badge=${gfitToken ? (gfitLoading ? 'SYNCING…' : 'CONNECTED') : 'NOT CONNECTED'}>
            ${!gfitToken ? html`
              <div class="card card-p" style=${{ textAlign:'center', padding:'20px' }}>
                <div style=${{ fontSize:'11px', color:'#555', marginBottom:'16px', lineHeight:'1.6' }}>
                  Connect Google Fit to sync daily steps, calories, and running sessions.
                </div>
                <button onClick=${onConnectGfit} style=${{
                  background:'#4285f4', color:'#fff', border:'none', borderRadius:'6px',
                  padding:'10px 24px', fontFamily:"'IBM Plex Mono', monospace", fontSize:'11px',
                  letterSpacing:'0.08em', cursor:'pointer', fontWeight:'600',
                }}>CONNECT GOOGLE FIT</button>
              </div>
            ` : html`
              ${gfitData?.days?.length && html`
                <div class="stat-grid" style=${{ gridTemplateColumns:'repeat(3,1fr)', marginBottom:'12px' }}>
                  <div class="stat-card"><div class="stat-val">${avgSteps7d ? avgSteps7d.toLocaleString() : '—'}</div><div class="stat-label">AVG STEPS/DAY</div></div>
                  <div class="stat-card"><div class="stat-val">${totalCal7d ? totalCal7d.toLocaleString() : '—'}</div><div class="stat-label">CAL (7D)</div></div>
                  <div class="stat-card"><div class="stat-val accent">${gfitData.runs?.length || 0}</div><div class="stat-label">RUNS (30D)</div></div>
                </div>
              `}
              ${stepsChartData && html`
                <div class="card card-p" style=${{ marginBottom:'12px' }}>
                  <div style=${{ fontSize:'10px', color:'#555', marginBottom:'8px' }}>DAILY STEPS · LAST 14 DAYS</div>
                  <${ChartCanvas} type="bar" data=${stepsChartData} options=${stepsBarOpts} height=${100} />
                  <div style=${{ display:'flex', gap:'12px', marginTop:'6px', fontSize:'9px', color:'#555' }}>
                    <span><span style=${{ color:'rgba(39,174,96,0.7)' }}>■</span> ≥8k</span>
                    <span><span style=${{ color:'rgba(232,160,26,0.7)' }}>■</span> 5–8k</span>
                    <span><span style=${{ color:'rgba(232,80,26,0.5)' }}>■</span> &lt;5k</span>
                  </div>
                </div>
              `}
              <button onClick=${onSyncGfit} disabled=${gfitLoading} style=${{
                width:'100%', background:'#1a1a1a', color: gfitLoading ? '#555' : '#888',
                border:'1px solid #222', borderRadius:'6px', padding:'10px',
                fontFamily:"'IBM Plex Mono', monospace", fontSize:'10px', letterSpacing:'0.08em',
                cursor: gfitLoading ? 'default' : 'pointer',
              }}>${gfitLoading ? 'SYNCING…' : '↻ SYNC NOW'}</button>
            `}
          <//>

          <${Section} label="POLAR FLOW SYNC" badge=${polarToken ? (polarLoading ? 'SYNCING…' : polarSynced ? 'SYNCED' : 'CONNECTED') : 'NOT CONNECTED'}>
            ${!polarToken ? html`
              <div class="card card-p" style=${{ textAlign:'center', padding:'20px' }}>
                <div style=${{ fontSize:'11px', color:'#555', marginBottom:'16px', lineHeight:'1.6' }}>
                  Pull completed workouts from Polar Flow — HR, duration, and sport type.
                </div>
                <button onClick=${onConnectPolar} style=${{
                  background:'#d40000', color:'#fff', border:'none', borderRadius:'6px',
                  padding:'10px 24px', fontFamily:"'IBM Plex Mono', monospace", fontSize:'11px',
                  letterSpacing:'0.08em', cursor:'pointer', fontWeight:'600',
                }}>CONNECT POLAR FLOW</button>
              </div>
            ` : html`
              <div class="card card-p" style=${{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div style=${{ fontSize:'11px', color:'#888' }}>
                  ${polarSynced ? `${polarData.length} session${polarData.length !== 1 ? 's' : ''} synced` : 'Ready to sync'}
                </div>
                <button onClick=${onSyncPolar} disabled=${polarLoading} style=${{
                  background:'#1a1a1a', color: polarLoading ? '#555' : '#888',
                  border:'1px solid #222', borderRadius:'6px', padding:'8px 16px',
                  fontFamily:"'IBM Plex Mono', monospace", fontSize:'10px', letterSpacing:'0.08em',
                  cursor: polarLoading ? 'default' : 'pointer',
                }}>${polarLoading ? 'SYNCING…' : '↻ SYNC NOW'}</button>
              </div>
            `}
          <//>

          <${Section} label="WORKOUT HR · HRV" badge=${polarData.length ? 'LIVE' : 'PENDING'}>
            ${polarData.length === 0 ? html`
              <${PendingCard} title="POLAR H10"
                desc="Connect Polar H10 via n8n to overlay per-workout HR and HRV (RMSSD ms) on the Surf the Curve chart."
                metrics=${[{label:'AVG WORKOUT HR'},{label:'MAX HR'},{label:'HRV (RMSSD ms)'},{label:'HR ZONES'}]} />
            ` : html`
              <div class="stat-grid" style=${{ gridTemplateColumns:'repeat(3,1fr)', marginBottom:'12px' }}>
                <div class="stat-card"><div class="stat-val">${lastPolar.avg_hr || '—'}</div><div class="stat-label">AVG HR</div></div>
                <div class="stat-card"><div class="stat-val">${lastPolar.max_hr || '—'}</div><div class="stat-label">MAX HR</div></div>
                <div class="stat-card"><div class="stat-val accent">${lastPolar.hrv_rmssd ? Math.round(lastPolar.hrv_rmssd) : '—'}</div><div class="stat-label">HRV ms</div></div>
              </div>
              <div class="card card-p">
                <${ChartCanvas} type="line" data=${polarChartData} options=${dualYOpts} height=${140} />
                <div class="chart-legend" style=${{ marginTop:'8px' }}>
                  <span style=${{ color:'#27ae60' }}>● HRV (RMSSD)</span>
                  <span style=${{ color:'#e8501a' }}>● Avg HR</span>
                </div>
              </div>
            `}
          <//>

          <${Section} label="RUNNING" badge=${runData.length ? 'LIVE' : 'PENDING'}>
            ${runData.length === 0 ? html`
              <${PendingCard} title="RUNNING APP"
                desc="Connect running app via n8n. Pace trend, HR zone breakdown, and distance tracking populate here."
                metrics=${[{label:'AVG PACE'},{label:'DISTANCE (KM)'},{label:'AVG HR'},{label:'ZONE DIST %'}]} />
            ` : html`
              <div class="stat-grid" style=${{ gridTemplateColumns:'repeat(3,1fr)', marginBottom:'12px' }}>
                <div class="stat-card"><div class="stat-val bebas" style=${{ fontSize:'28px' }}>${lastRun.avg_pace_km || '—'}</div><div class="stat-label">AVG PACE /km</div></div>
                <div class="stat-card"><div class="stat-val">${lastRun.distance_km ? lastRun.distance_km.toFixed(1) : '—'}</div><div class="stat-label">KM</div></div>
                <div class="stat-card"><div class="stat-val">${lastRun.avg_hr || '—'}</div><div class="stat-label">AVG HR</div></div>
              </div>
              ${lastRun.hr_zones && html`
                <div class="card card-p" style=${{ marginBottom:'12px' }}>
                  <div style=${{ fontSize:'10px', color:'#555', marginBottom:'8px' }}>HR ZONES · LAST RUN</div>
                  ${['z1','z2','z3','z4','z5'].map((z,i) => {
                    const pct = ((lastRun.hr_zones[z+'_pct']) || 0).toFixed(0);
                    const colors = ['#27ae60','#4a90d9','#f39c12','#e8501a','#c0392b'];
                    return html`
                      <div class="muscle-row" key=${z}>
                        <div class="muscle-name">ZONE ${i+1}</div>
                        <div class="muscle-bar-bg"><div class="muscle-bar-fill" style=${{ width:pct+'%', background:colors[i] }}><span class="muscle-bar-num">${pct}%</span></div></div>
                      </div>`;
                  })}
                </div>`}
              <div class="card card-p">
                <${ChartCanvas} type="line" data=${runChartData} options=${BASE_OPTS} height=${120} />
              </div>
            `}
          <//>

          <${Section} label="ROWING · CONCEPT2" badge=${rowData.length ? 'LIVE' : logRows.length ? 'PARTIAL' : 'PENDING'}>
            ${rowData.length === 0 ? html`
              ${logRows.length > 0 && html`
                <div class="card card-p" style=${{ marginBottom:'12px' }}>
                  <div style=${{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:'#555', marginBottom:'12px' }}>
                    <span>${logRows.length} SESSION${logRows.length !== 1 ? 'S' : ''} FROM WORKOUT LOG</span>
                    <span>ERGDATA PENDING</span>
                  </div>
                  ${logRows.slice(0,6).map((r,i) => html`
                    <div key=${i} style=${{ display:'flex', justifyContent:'space-between', fontSize:'11px', marginBottom:'8px' }}>
                      <span style=${{ color:'#fff' }}>${fmtDate(r.date)}</span>
                      <span style=${{ color:'#555' }}>${fmtDur(r.dur)}</span>
                      <span style=${{ color:'#2a2a2a' }}>split · SPM · HR via ErgData</span>
                    </div>`)}
                </div>`}
              <${PendingCard} title="CONCEPT2 ERGDATA"
                desc="Connect ErgData via n8n for split times, stroke rate, and HR data."
                metrics=${[{label:'AVG SPLIT /500m'},{label:'STROKE RATE SPM'},{label:'DISTANCE (m)'},{label:'AVG HR'}]} />
            ` : html`
              <div class="stat-grid" style=${{ gridTemplateColumns:'repeat(4,1fr)', marginBottom:'12px' }}>
                <div class="stat-card"><div class="stat-val bebas" style=${{ fontSize:'18px' }}>${fmtSplit(lastRow.avg_split_seconds)}</div><div class="stat-label">SPLIT</div></div>
                <div class="stat-card"><div class="stat-val">${lastRow.avg_stroke_rate || '—'}</div><div class="stat-label">SPM</div></div>
                <div class="stat-card"><div class="stat-val">${lastRow.distance_meters ? (lastRow.distance_meters/1000).toFixed(1)+'k' : '—'}</div><div class="stat-label">METERS</div></div>
                <div class="stat-card"><div class="stat-val">${lastRow.avg_hr || '—'}</div><div class="stat-label">AVG HR</div></div>
              </div>
              <div class="card card-p" style=${{ marginBottom:'12px' }}>
                <div style=${{ fontSize:'10px', color:'#555', marginBottom:'8px' }}>SPLIT TREND (lower = faster)</div>
                <${ChartCanvas} type="line" data=${rowChartData} options=${BASE_OPTS} height=${120} />
              </div>
              <div class="card card-p">
                ${rowData.slice(0,8).map((r,i) => html`
                  <div key=${i} style=${{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'11px', padding:'8px 0', borderBottom: i < Math.min(rowData.length,8)-1 ? '1px solid #1a1a1a' : 'none' }}>
                    <span style=${{ color:'#888' }}>${fmtDate(r.date_local)}</span>
                    <span style=${{ color:'#fff' }}>${fmtSplit(r.avg_split_seconds)}</span>
                    <span style=${{ color:'#555' }}>${r.avg_stroke_rate || '—'} SPM</span>
                    <span style=${{ color:'#555' }}>${r.distance_meters ? r.distance_meters+'m' : '—'}</span>
                  </div>`)}
              </div>
            `}
          <//>
        </div>`;
    }

    // ── HISTORY ──────────────────────────────────────────────────
    function SessionCard({ session }) {
      const [open, setOpen] = useState(false);
      const exs   = useMemo(() => parseExs(session.exercises), [session.exercises]);
      const rdy   = session.readiness;
      const rdyC  = !rdy ? '#555' : rdy >= 85 ? '#22c55e' : rdy >= 70 ? '#f59e0b' : rdy >= 55 ? '#e8501a' : '#ef4444';

      return html`
        <div class="session-card">
          <div class="session-header" onClick=${() => setOpen(o => !o)}>
            <div style=${{ flex:1, minWidth:0 }}>
              <div style=${{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap', marginBottom:'4px' }}>
                <span class="bebas" style=${{ fontSize:'20px', lineHeight:'1', color:'#fff' }}>${session.template_name}</span>
                ${rdy != null && html`<${Badge} color=${rdyC}>${rdy} RDY<//>`}
              </div>
              <div style=${{ fontSize:'11px', color:'#555' }}>
                ${fmtDate(localD(session.date_local))} · ${fmtDur(session.duration_seconds)} · ${session.total_sets_logged} sets
              </div>
            </div>
            <span style=${{ color:'#444', fontSize:'11px', flexShrink:0 }}>${open ? '▲' : '▼'}</span>
          </div>

          ${open && html`
            <div class="session-body">
              ${exs.length === 0
                ? html`<div style=${{ padding:'12px 16px', fontSize:'11px', color:'#333' }}>NO EXERCISE DATA</div>`
                : exs.map((ex, i) => {
                    if (!ex.sets.length) return null;
                    const color = MUSCLE_COLORS[getMuscleGroup(ex.id)] || '#444';
                    return html`
                      <div class="session-ex" key=${i}>
                        <div class="ex-dot" style=${{ background: color }}></div>
                        <span class="ex-name">${ex.name}</span>
                        <span class="ex-sets">
                          ${ex.sets.map((s, si) => html`<span key=${si}>${si > 0 ? html`<span style=${{ color:'#333' }}> / </span>` : ''}${s.weight ? `${s.weight}×${s.reps}` : s.reps || '—'}</span>`)}
                        </span>
                      </div>`;
                  })}
              ${session.emom && session.emom.completed && html`
                <div style=${{ padding:'8px 16px', fontSize:'11px', color:'#555', borderTop:'1px solid #1a1a1a' }}>EMOM COMPLETED</div>`}
              ${session.amrap && session.amrap.rounds > 0 && html`
                <div style=${{ padding:'8px 16px', fontSize:'11px', color:'#555', borderTop:'1px solid #1a1a1a' }}>AMRAP: ${session.amrap.rounds} ROUNDS</div>`}
            </div>`}
        </div>`;
    }

    function HistoryScreen({ sessions }) {
      const [filter, setFilter] = useState('all');
      const tids = useMemo(() => {
        const seen = {};
        sessions.forEach(s => { if (s.template_id) seen[s.template_id] = true; });
        return Object.keys(seen);
      }, [sessions]);
      const display = useMemo(() => {
        const base = filter === 'all' ? sessions : sessions.filter(s => s.template_id === filter);
        return base.slice().sort((a, b) => new Date(b.date_local) - new Date(a.date_local));
      }, [sessions, filter]);

      return html`
        <div class="screen">
          <${Section} label=${'WORKOUT HISTORY · ' + sessions.length + ' SESSIONS'}>
            <div class="filter-row">
              ${['all'].concat(tids.slice(0, 7)).map(id => html`
                <button class="filter-chip ${filter === id ? 'active' : ''}" key=${id}
                  onClick=${() => setFilter(id)}>
                  ${id === 'all' ? 'ALL' : id.replace(/_/g,'').toUpperCase().slice(0,12)}
                </button>`)}
            </div>
            ${display.length === 0
              ? html`<${EmptyState} msg="No sessions logged yet" />`
              : display.map((s, i) => html`<${SessionCard} key=${s.id || i} session=${s} />`)}
          <//>
        </div>`;
    }

    // ── APP ──────────────────────────────────────────────────────
    function App() {
      const [sessions,      setSessions]      = useState([]);
      const [measurements,  setMeasurements]  = useState([]);
      const [cardioSessions,setCardioSessions] = useState([]);
      const [loading,       setLoading]       = useState(true);
      const [error,         setError]         = useState(null);
      const [tab,           setTab]           = useState('overview');
      const [gfitToken,     setGfitToken]     = useState(() => sessionStorage.getItem('gfit_token') || null);
      const [gfitData,      setGfitData]      = useState(null);
      const [gfitLoading,   setGfitLoading]   = useState(false);
      const [polarToken,    setPolarToken]    = useState(() => sessionStorage.getItem('polar_token') || null);
      const [polarUserId,   setPolarUserId]   = useState(() => sessionStorage.getItem('polar_user') || null);
      const [polarLoading,  setPolarLoading]  = useState(false);
      const [polarSynced,   setPolarSynced]   = useState(false);

      const reloadCardio = () =>
        sb.from('cardio_sessions').select('*').order('date_local', { ascending: false }).limit(200)
          .then(({ data, error: ce }) => { if (!ce) setCardioSessions(data || []); });

      const handleSync = async (token) => {
        setGfitLoading(true);
        try {
          const data = await gfitFetch(token);
          setGfitData(data);
          await reloadCardio();
        } catch (e) {
          console.error('Google Fit sync error:', e);
        } finally {
          setGfitLoading(false);
        }
      };

      const handleConnect = () => {
        gfitConnect(async (token) => {
          setGfitToken(token);
          await handleSync(token);
        });
      };

      // Auto-sync Google Fit if token already exists
      useEffect(() => {
        if (gfitToken) handleSync(gfitToken);
      }, []);

      // Handle Polar OAuth redirect (token in URL hash)
      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (!hash.includes('polar_token')) return;
        const params = Object.fromEntries(new URLSearchParams(hash));
        if (params.polar_token) {
          sessionStorage.setItem('polar_token', params.polar_token);
          sessionStorage.setItem('polar_user',  params.polar_user || '');
          setPolarToken(params.polar_token);
          setPolarUserId(params.polar_user || '');
          window.history.replaceState(null, '', window.location.pathname);
          // Auto-sync on connect
          handlePolarSync(params.polar_token, params.polar_user);
        }
      }, []);

      const handlePolarSync = async (token, userId) => {
        const t = token || polarToken;
        const u = userId || polarUserId;
        if (!t || !u) return;
        setPolarLoading(true);
        try {
          await polarFetch(t, u);
          await reloadCardio();
          setPolarSynced(true);
        } catch (e) {
          console.error('Polar sync error:', e);
        } finally {
          setPolarLoading(false);
        }
      };

      useEffect(() => {
        Promise.all([
          sb.from('workout_sessions').select('*').order('date_local', { ascending: false }).limit(300),
          sb.from('body_measurements').select('*').order('date', { ascending: false }).limit(100),
          sb.from('cardio_sessions').select('*').order('date_local', { ascending: false }).limit(200),
        ]).then(([{ data: sess, error: se }, { data: meas, error: me }, { data: cardio, error: ce }]) => {
          if (se) { setError(se.message); }
          else {
            setSessions(sess || []);
            setMeasurements(me ? [] : (meas || []));
            setCardioSessions(ce ? [] : (cardio || []));
          }
        }).catch(e => setError(e.message)).finally(() => setLoading(false));
      }, []);

      if (loading) return html`
        <div class="loading-screen">
          <div class="loading-title">IRON ATLAS</div>
          <div class="loading-sub">LOADING TRAINING DATA</div>
          <div class="loading-bar-bg"><div class="loading-bar-fill"></div></div>
        </div>`;

      const dateStr = new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

      return html`
        <div style=${{ background:'#0a0a0a', minHeight:'100vh', color:'#e8e8e8', fontFamily:"'IBM Plex Mono', monospace" }}>
          <div class="header">
            <div class="header-title">IRON ATLAS</div>
            <div class="header-date">${dateStr}</div>
          </div>

          ${error && html`<div class="error-banner">SUPABASE ERROR: ${error}</div>`}

          ${tab === 'overview' && html`<${OverviewScreen}  sessions=${sessions} />`}
          ${tab === 'strength' && html`<${StrengthScreen}  sessions=${sessions} />`}
          ${tab === 'body'     && html`<${BodyScreen}       measurements=${measurements} />`}
          ${tab === 'cardio'   && html`<${CardioScreen}     sessions=${sessions} cardioSessions=${cardioSessions} gfitToken=${gfitToken} gfitData=${gfitData} gfitLoading=${gfitLoading} onConnectGfit=${handleConnect} onSyncGfit=${() => handleSync(gfitToken)} polarToken=${polarToken} polarLoading=${polarLoading} polarSynced=${polarSynced} onConnectPolar=${polarConnect} onSyncPolar=${() => handlePolarSync()} />`}
          ${tab === 'history'  && html`<${HistoryScreen}    sessions=${sessions} />`}

          <nav class="bottom-nav">
            ${TABS.map(t => html`
              <button class="nav-btn ${tab === t.id ? 'active' : ''}" key=${t.id} onClick=${() => setTab(t.id)}>
                <span class="nav-icon">${t.icon}</span>
                <span class="nav-label">${t.label}</span>
              </button>`)}
          </nav>
        </div>`;
    }

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
