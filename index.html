
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #0a0f1a;
  --card: #131b2e;
  --card-border: #1e2d44;
  --surface: #1a2540;
  --text: #e0e6ed;
  --text-dim: #6b7c95;
  --text-muted: #3d4f68;
  --accent: #4a90d9;
  --accent-dim: rgba(74,144,217,0.15);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.12);
  --orange: #e67e22;
  --orange-dim: rgba(230,126,34,0.12);
  --red: #e74c3c;
  --red-dim: rgba(231,76,60,0.12);
  --purple: #9b59b6;
  --purple-dim: rgba(155,89,182,0.15);
  --yellow: #f1c40f;
  --radius: 14px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; padding: 16px; padding-bottom: 120px; }
.screen.active { display: block; }

/* ===== HOME SCREEN ===== */
.home-header { text-align: center; padding: 24px 0 8px; }
.home-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.home-header .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.greeting { font-size: 15px; color: var(--text-dim); margin-bottom: 20px; text-align: center; }

.workout-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.workout-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.workout-card:active { transform: scale(0.98); background: var(--surface); }
.workout-card.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(74,144,217,0.1); }
.workout-card.rest-day { opacity: 0.5; }
.wc-day {
  width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0;
}
.wc-info { flex: 1; }
.wc-title { font-size: 15px; font-weight: 700; }
.wc-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.wc-arrow { color: var(--text-muted); font-size: 18px; }
.wc-today-badge {
  font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-dim);
  padding: 2px 8px; border-radius: 6px; margin-left: 8px;
}

.home-bottom { margin-top: 24px; display: flex; gap: 10px; }
.home-btn {
  flex: 1; padding: 14px; background: var(--card); border: 1px solid var(--card-border);
  border-radius: var(--radius); color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.home-btn:active { background: var(--surface); }

/* ===== PRE-WORKOUT ===== */
.pre-workout { padding: 20px 0; }
.pw-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; }
.readiness-input {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.readiness-label { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; }
.readiness-slider { width: 100%; -webkit-appearance: none; height: 8px; border-radius: 4px;
  background: linear-gradient(to right, var(--red), var(--orange), var(--green)); outline: none; }
.readiness-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
  background: #fff; border: 3px solid var(--accent); cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.readiness-value { text-align: center; font-size: 48px; font-weight: 800; margin: 12px 0 4px; }
.readiness-rec { text-align: center; font-size: 13px; font-weight: 600; padding: 6px 12px;
  border-radius: 8px; display: inline-block; }

.start-btn {
  width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-size: 17px; font-weight: 800; cursor: pointer;
  letter-spacing: 0.3px;
}
.start-btn:active { opacity: 0.9; transform: scale(0.99); }

/* ===== ACTIVE WORKOUT ===== */
.wo-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; position: sticky; top: 0; background: var(--bg); z-index: 50;
  border-bottom: 1px solid var(--card-border); margin: -16px -16px 12px; padding: 12px 16px;
}
.wo-topbar-title { font-size: 14px; font-weight: 700; }
.wo-topbar-timer { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--accent); }
.wo-topbar-btn {
  background: var(--card); border: 1px solid var(--card-border); color: var(--text);
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.wo-topbar-btn.finish { background: var(--green); border-color: var(--green); color: #fff; }
.h10-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 20px; padding: 5px 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.h10-pill.connected { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.h10-pill .h10-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.h10-pill.connected .h10-dot { background: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Exercise blocks */
.exercise-block {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius);
  margin-bottom: 12px; overflow: hidden;
}
.exercise-block.superset { border-color: var(--purple); border-left: 3px solid var(--purple); }
.superset-label {
  font-size: 11px; font-weight: 700; color: var(--purple); background: var(--purple-dim);
  padding: 4px 12px; display: flex; align-items: center; gap: 6px;
}
.eb-header {
  display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer;
}
.eb-header:active { background: var(--surface); }
.eb-name { font-size: 15px; font-weight: 700; flex: 1; }
.eb-badge {
  font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
}
.eb-badge.done { background: var(--green-dim); color: var(--green); }
.eb-badge.partial { background: var(--orange-dim); color: var(--orange); }
.eb-target { font-size: 12px; color: var(--text-dim); }
.eb-notes { font-size: 11px; color: var(--text-muted); padding: 0 16px 8px; }

.eb-body { padding: 0 12px 12px; }

/* Set rows */
.set-table { width: 100%; }
.set-header {
  display: grid; grid-template-columns: 40px 1fr 1fr 1fr 44px; gap: 6px;
  padding: 6px 4px; font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.set-row {
  display: grid; grid-template-columns: 40px 1fr 1fr 1fr 44px; gap: 6px;
  padding: 6px 4px; border-radius: 8px; align-items: center; min-height: 44px;
}
.set-row.logged { background: var(--green-dim); }
.set-num {
  font-size: 13px; font-weight: 800; color: var(--text-dim); text-align: center;
  width: 28px; height: 28px; border-radius: 8px; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
}
.set-row.logged .set-num { background: var(--green); color: #fff; }
.set-prev { font-size: 12px; color: var(--text-muted); text-align: center; }
.set-input {
  width: 100%; background: var(--surface); border: 1px solid var(--card-border);
  border-radius: 8px; color: #fff; padding: 8px; font-size: 15px; font-weight: 600;
  text-align: center; -webkit-appearance: none;
}
.set-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-dim); }
.set-input.filled { border-color: var(--green); background: rgba(46,204,113,0.05); }
.set-check {
  width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--card-border);
  background: transparent; color: var(--text-muted); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.set-check:active { transform: scale(0.95); }
.set-check.checked { background: var(--green); border-color: var(--green); color: #fff; }

/* Rest timer bar */
.rest-bar {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 1px solid var(--card-border); padding: 16px; padding-bottom: calc(16px + var(--safe-bottom));
  z-index: 60; transform: translateY(100%); transition: transform 0.3s ease;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.rest-bar.visible { transform: translateY(0); }
.rest-time { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; }
.rest-time.warning { color: var(--orange); }
.rest-time.done { color: var(--green); }
.rest-label { font-size: 13px; color: var(--text-dim); }
.rest-progress {
  width: 100%; height: 4px; background: var(--card-border); border-radius: 2px; overflow: hidden;
}
.rest-progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; border-radius: 2px; }
.rest-actions { display: flex; gap: 10px; width: 100%; }
.rest-btn {
  flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700;
  cursor: pointer; text-align: center; border: none;
}
.rest-btn.skip { background: var(--card); color: var(--text); border: 1px solid var(--card-border); }
.rest-btn.add { background: var(--accent-dim); color: var(--accent); }

/* EMOM Timer */
.emom-container {
  background: var(--card); border: 2px solid var(--green); border-radius: var(--radius);
  padding: 20px; text-align: center; margin-bottom: 12px;
}
.emom-title { font-size: 16px; font-weight: 800; color: var(--green); margin-bottom: 4px; }
.emom-round { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
.emom-time { font-size: 64px; font-weight: 800; font-variant-numeric: tabular-nums; }
.emom-exercise { font-size: 18px; font-weight: 700; margin: 12px 0; padding: 12px;
  background: var(--surface); border-radius: 10px; }
.emom-btn { padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 800;
  border: none; cursor: pointer; margin: 4px; }
.emom-btn.start { background: var(--green); color: #fff; }
.emom-btn.stop { background: var(--red); color: #fff; }
.emom-btn.reset { background: var(--card); color: var(--text); border: 1px solid var(--card-border); }

/* AMRAP Timer */
.amrap-container {
  background: var(--card); border: 2px solid var(--orange); border-radius: var(--radius);
  padding: 20px; text-align: center; margin-bottom: 12px;
}
.amrap-title { font-size: 16px; font-weight: 800; color: var(--orange); margin-bottom: 4px; }
.amrap-time { font-size: 64px; font-weight: 800; font-variant-numeric: tabular-nums; }
.amrap-rounds { font-size: 20px; font-weight: 800; margin: 12px 0; }
.amrap-rounds span { font-size: 48px; color: var(--orange); }
.amrap-exercises { font-size: 14px; color: var(--text-dim); margin: 8px 0 16px;
  line-height: 1.8; text-align: left; padding: 12px; background: var(--surface); border-radius: 10px; }
.amrap-round-btn {
  width: 100%; padding: 18px; background: var(--orange); color: #fff; border: none;
  border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 10px;
}
.amrap-round-btn:active { opacity: 0.9; }

/* ===== SUMMARY ===== */
.summary-header { text-align: center; padding: 30px 0 20px; }
.summary-header .check { font-size: 60px; margin-bottom: 12px; }
.summary-header h2 { font-size: 24px; font-weight: 800; }
.summary-header .duration { font-size: 15px; color: var(--text-dim); margin-top: 4px; }

.summary-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0;
}
.stat-card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  padding: 14px; text-align: center;
}
.stat-value { font-size: 24px; font-weight: 800; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.summary-exercises {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px;
}
.se-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-dim); }
.se-row { display: flex; justify-content: space-between; padding: 8px 0;
  border-bottom: 1px solid var(--card-border); font-size: 13px; }
.se-row:last-child { border-bottom: none; }
.se-name { font-weight: 600; }
.se-detail { color: var(--text-dim); }

.summary-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.summary-btn {
  width: 100%; padding: 16px; border-radius: var(--radius); font-size: 15px;
  font-weight: 700; cursor: pointer; text-align: center; border: none;
}
.summary-btn.primary { background: var(--accent); color: #fff; }
.summary-btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--card-border); }

/* ===== HISTORY ===== */
.history-header { display: flex; align-items: center; padding: 16px 0; gap: 12px; }
.back-btn {
  background: var(--card); border: 1px solid var(--card-border); color: var(--text);
  width: 40px; height: 40px; border-radius: 10px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.history-header h2 { font-size: 20px; font-weight: 800; flex: 1; }

.history-card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
}
.history-card:active { background: var(--surface); }
.hc-top { display: flex; justify-content: space-between; align-items: center; }
.hc-name { font-size: 15px; font-weight: 700; }
.hc-date { font-size: 12px; color: var(--text-dim); }
.hc-stats { display: flex; gap: 16px; margin-top: 6px; font-size: 12px; color: var(--text-dim); }

.export-box {
  background: #050a14; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  padding: 12px; margin: 12px 0; max-height: 200px; overflow-y: auto;
  font-family: 'SF Mono', monospace; font-size: 11px; color: var(--text-dim);
  white-space: pre-wrap; word-break: break-all;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--green); color: #fff; padding: 12px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 700; z-index: 200; transition: transform 0.3s;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }

/* ===== UTILITIES ===== */
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.hidden { display: none !important; }

@media (prefers-color-scheme: light) {
  /* Keep dark — this is a gym app */
}
</style>
</head>
<body>

<!-- ==================== HOME SCREEN ==================== -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1>🏋️ Workout</h1>
    <div class="subtitle">Tap a workout to begin</div>
  </div>
  <div class="greeting" id="greeting"></div>
  <div class="workout-cards" id="workout-cards"></div>
  <div style="margin-top:20px;">
    <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Backup / Makeup Days</div>
    <div class="workout-cards" id="flex-cards"></div>
  </div>
  <div class="home-bottom">
    <div class="home-btn" onclick="showScreen('history')">📊 History</div>
    <div class="home-btn" onclick="exportAll()">📤 Export JSON</div>
  </div>
</div>

<!-- ==================== PRE-WORKOUT SCREEN ==================== -->
<div id="screen-pre" class="screen">
  <div class="pre-workout">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <button class="back-btn" onclick="showScreen('home')">←</button>
      <div class="pw-title" id="pw-title" style="margin:0;flex:1;"></div>
    </div>
    <div class="readiness-input">
      <div class="readiness-label">Oura Readiness Score (or estimate)</div>
      <div class="readiness-value" id="readiness-val">75</div>
      <input type="range" min="30" max="100" value="75" class="readiness-slider" id="readiness-slider"
        oninput="updateReadiness(this.value)">
      <div class="text-center mt-8">
        <span class="readiness-rec" id="readiness-rec"></span>
      </div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startWorkout()">START WORKOUT</button>
  </div>
</div>

<!-- ==================== ACTIVE WORKOUT SCREEN ==================== -->
<div id="screen-workout" class="screen">
  <div class="wo-topbar">
    <button class="wo-topbar-btn" onclick="confirmEnd()">✕</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="wo-topbar-timer" id="wo-timer">0:00</div>
      <div class="h10-pill" id="h10-pill" onclick="toggleH10()">
        <div class="h10-dot"></div>
        <span id="h10-label">H10</span>
      </div>
    </div>
    <button class="wo-topbar-btn finish" onclick="finishWorkout()">Finish</button>
  </div>
  <div id="exercise-list"></div>
</div>

<!-- ==================== REST TIMER ==================== -->
<div class="rest-bar" id="rest-bar">
  <div class="rest-label" id="rest-label">Rest</div>
  <div class="rest-time" id="rest-time">0:00</div>
  <div class="rest-progress"><div class="rest-progress-fill" id="rest-fill"></div></div>
  <div class="rest-actions">
    <button class="rest-btn skip" onclick="skipRest()">Skip</button>
    <button class="rest-btn add" onclick="addRest(30)">+30s</button>
  </div>
</div>

<!-- ==================== SUMMARY SCREEN ==================== -->
<div id="screen-summary" class="screen">
  <div class="summary-header">
    <div class="check">✅</div>
    <h2>Workout Complete!</h2>
    <div class="duration" id="sum-duration"></div>
    <div id="sync-status" style="margin-top:8px;font-size:11px;font-family:'JetBrains Mono','SF Mono',monospace;letter-spacing:0.3px;"></div>
  </div>
  <div class="summary-stats" id="sum-stats"></div>
  <div class="summary-exercises" id="sum-exercises"></div>
  <div class="summary-actions">
    <button class="summary-btn primary" onclick="exportSession()">📤 Copy JSON for Supabase</button>
    <button class="summary-btn secondary" onclick="downloadSession()">⬇️ Download JSON</button>
    <button class="summary-btn secondary" onclick="showScreen('home')">← Done</button>
  </div>
  <div class="export-box hidden" id="sum-json"></div>
</div>

<!-- ==================== HISTORY SCREEN ==================== -->
<div id="screen-history" class="screen">
  <div class="history-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h2>History</h2>
    <button class="home-btn" onclick="exportAll()" style="flex:0;font-size:13px;padding:8px 14px;">📤 Export All</button>
  </div>
  <div id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// SUPABASE (raw REST — no SDK)
// ============================================================
const SB_URL = 'https://wnwkraukvizulycjssyk.supabase.co/rest/v1';
const SB_KEY = 'sb_publishable__XnF9a593J_CgLzof3k-Mw_AA-jKpl6';
const WO_TABLE = 'workout_sessions';

function sbHeaders(extra = {}) {
  return Object.assign({
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  }, extra);
}

function setSyncStatus(msg, color = '#4a5e80') {
  const el = document.getElementById('sync-status');
  if (el) el.innerHTML = `<span style="color:${color}">${msg}</span>`;
}

async function syncSessionToSupabase(session) {
  setSyncStatus('⏳ Syncing...', '#f59e0b');
  try {
    const row = {
      date_local: session.dateLocal,
      date_iso: session.date,
      template_id: session.templateId,
      template_name: session.templateName,
      duration_seconds: session.duration,
      readiness: session.readiness,
      exercises: session.exercises,
      emom: session.emom || null,
      amrap: session.amrap || null,
      total_sets_logged: session.totalSetsLogged
    };

    const res = await fetch(`${SB_URL}/${WO_TABLE}`, {
      method: 'POST',
      headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
      body: JSON.stringify(row)
    });

    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase sync error:', res.status, err);
      setSyncStatus('⚠️ ' + (err || res.statusText), '#ef4444');
      return false;
    }

    setSyncStatus('✅ Synced to Supabase', '#10b981');
    return true;
  } catch (err) {
    console.error('Sync exception:', err);
    setSyncStatus('⚠️ ' + (err.message || String(err)), '#ef4444');
    return false;
  }
}

// ============================================================
// WORKOUT TEMPLATES
// ============================================================

// ============================================================
// POLAR H10 — WEB BLUETOOTH
// ============================================================
let h10 = {
  device: null,
  char: null,
  connected: false,
  hrReadings: [],   // all HR values during workout
  rrIntervals: [],  // RR intervals in ms
};

function calculateRMSSD(rrMs) {
  if (rrMs.length < 2) return null;
  const diffs = [];
  for (let i = 1; i < rrMs.length; i++) diffs.push(rrMs[i] - rrMs[i - 1]);
  return Math.round(Math.sqrt(diffs.reduce((s, d) => s + d * d, 0) / diffs.length));
}

function handleHrMeasurement(event) {
  const v = event.target.value;
  const flags = v.getUint8(0);
  const hrFormat = flags & 0x1;
  let hr, offset;
  if (hrFormat === 0) { hr = v.getUint8(1); offset = 2; }
  else                { hr = v.getUint16(1, true); offset = 3; }
  h10.hrReadings.push(hr);
  // RR intervals present (bit 4)
  if (flags & 0x10) {
    while (offset + 1 < v.byteLength) {
      h10.rrIntervals.push(v.getUint16(offset, true) * 1000 / 1024); // → ms
      offset += 2;
    }
  }
  updateH10Pill(hr);
}

function updateH10Pill(hr) {
  const pill  = document.getElementById('h10-pill');
  const label = document.getElementById('h10-label');
  if (!pill) return;
  if (h10.connected) {
    pill.className = 'h10-pill connected';
    label.textContent = hr ? `${hr} bpm` : 'H10 ♥';
  } else {
    pill.className = 'h10-pill';
    label.textContent = 'H10';
  }
}

async function connectH10() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth is not supported on this browser. Use Chrome or Edge on Android/desktop.');
    return;
  }
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Polar' }],
      optionalServices: ['heart_rate'],
    });
    h10.device = device;
    device.addEventListener('gattserverdisconnected', disconnectH10);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    h10.char      = await service.getCharacteristic('heart_rate_measurement');
    h10.char.addEventListener('characteristicvaluechanged', handleHrMeasurement);
    await h10.char.startNotifications();
    h10.connected = true;
    updateH10Pill(null);
  } catch (e) {
    if (e.name !== 'NotFoundError') console.error('H10 connect error:', e);
  }
}

function disconnectH10() {
  h10.connected = false;
  if (h10.device?.gatt?.connected) h10.device.gatt.disconnect();
  updateH10Pill(null);
}

function toggleH10() {
  if (h10.connected) disconnectH10();
  else connectH10();
}

function getH10SessionData() {
  if (h10.hrReadings.length === 0) return null;
  return {
    avg_hr:    Math.round(h10.hrReadings.reduce((a, b) => a + b, 0) / h10.hrReadings.length),
    max_hr:    Math.max(...h10.hrReadings),
    hrv_rmssd: calculateRMSSD(h10.rrIntervals),
  };
}

function resetH10Session() {
  h10.hrReadings  = [];
  h10.rrIntervals = [];
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('workout_history') || '[]'); } catch(e) { return []; }
}
function saveHistory(h) { localStorage.setItem('workout_history', JSON.stringify(h)); }

function getLastSession(templateId) {
  const h = getHistory();
  return h.find(s => s.templateId === templateId);
}

// HOME SCREEN
// ============================================================
function renderHome() {
  const today = new Date().getDay();
  const greeting = document.getElementById('greeting');
  const hour = new Date().getHours();
  const timeStr = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
  greeting.textContent = `Good ${timeStr} — ${DAY_NAMES[today]}`;

  const container = document.getElementById('workout-cards');
  // Order: Mon(1), Tue(2), Wed(3), Thu(4), Fri(5), Sat(6), Sun(0)
  const order = [1,2,3,4,5,6,0];
  let html = '';

  order.forEach(dayNum => {
    const tmpl = TEMPLATES.find(t => t.day === dayNum);
    if (!tmpl) return;
    const isToday = dayNum === today;
    const isRest = tmpl.isRest;
    const last = getLastSession(tmpl.id);
    const lastStr = last ? `Last: ${formatDateShort(last.date)}` : '';

    html += `
      <div class="workout-card ${isToday ? 'today' : ''} ${isRest ? 'rest-day' : ''}"
        onclick="${isRest ? '' : `selectWorkout('${tmpl.id}')`}">
        <div class="wc-day" style="background:${tmpl.color}22;color:${tmpl.color}">
          ${DAY_SHORT[dayNum]}
        </div>
        <div class="wc-info">
          <div class="wc-title">${tmpl.name}${isToday ? '<span class="wc-today-badge">TODAY</span>' : ''}</div>
          <div class="wc-desc">${tmpl.duration}${lastStr ? ' · ' + lastStr : ''}</div>
        </div>
        ${isRest ? '' : '<div class="wc-arrow">›</div>'}
      </div>
    `;
  });
  container.innerHTML = html;

  // Render flexible/makeup templates below weekly schedule
  const flexTemplates = TEMPLATES.filter(t => t.isFlexible);
  const flexContainer = document.getElementById('flex-cards');
  if (flexContainer && flexTemplates.length) {
    let flexHtml = '';
    flexTemplates.forEach(tmpl => {
      const last = getLastSession(tmpl.id);
      const lastStr = last ? `Last: ${formatDateShort(last.date)}` : 'Use when you miss a day';
      flexHtml += `
        <div class="workout-card" onclick="selectWorkout('${tmpl.id}')">
          <div class="wc-day" style="background:${tmpl.color}22;color:${tmpl.color};font-size:11px;">ALT</div>
          <div class="wc-info">
            <div class="wc-title">${tmpl.name}</div>
            <div class="wc-desc">${tmpl.duration} · ${lastStr}</div>
          </div>
          <div class="wc-arrow">›</div>
        </div>
      `;
    });
    flexContainer.innerHTML = flexHtml;
  }
}

// ============================================================
// PRE-WORKOUT
// ============================================================
function selectWorkout(templateId) {
  state.activeTemplate = TEMPLATES.find(t => t.id === templateId);
  document.getElementById('pw-title').textContent = state.activeTemplate.name;
  updateReadiness(75);
  document.getElementById('readiness-slider').value = 75;
  showScreen('pre');
}

function updateReadiness(val) {
  val = parseInt(val);
  state.readiness = val;
  document.getElementById('readiness-val').textContent = val;
  const rec = document.getElementById('readiness-rec');
  if (val >= 85) { rec.textContent = '🟢 Full send — push hard today'; rec.style.background = 'rgba(46,204,113,0.15)'; rec.style.color = '#2ecc71'; }
  else if (val >= 70) { rec.textContent = '🟡 Normal — follow program as written'; rec.style.background = 'rgba(241,196,15,0.15)'; rec.style.color = '#f1c40f'; }
  else if (val >= 55) { rec.textContent = '🟠 Reduced — drop 1 set per exercise'; rec.style.background = 'rgba(230,126,34,0.15)'; rec.style.color = '#e67e22'; }
  else { rec.textContent = '🔴 Active recovery only — walk, mobility, skip lifting'; rec.style.background = 'rgba(231,76,60,0.15)'; rec.style.color = '#e74c3c'; }
}

// ============================================================
// ACTIVE WORKOUT
// ============================================================
function startWorkout() {
  state.startTime = Date.now();
  state.setData = {};
  state.emomState = null;
  state.amrapState = null;

  // Start session timer
  clearInterval(state.workoutTimer);
  state.workoutTimer = setInterval(updateWorkoutTimer, 1000);

  renderExercises();
  showScreen('workout');
}

function updateWorkoutTimer() {
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('wo-timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function renderExercises() {
  const tmpl = state.activeTemplate;
  const last = getLastSession(tmpl.id);
  const container = document.getElementById('exercise-list');
  let html = '';

  // Group by supersets
  let i = 0;
  while (i < tmpl.exercises.length) {
    const ex = tmpl.exercises[i];
    if (ex.superset) {
      // Find all exercises in this superset group
      const ssId = ex.superset;
      const group = [];
      while (i < tmpl.exercises.length && tmpl.exercises[i].superset === ssId) {
        group.push(tmpl.exercises[i]);
        i++;
      }
      html += `<div class="exercise-block superset">`;
      html += `<div class="superset-label">⟳ SUPERSET ${ssId} — do back to back, rest after pair</div>`;
      group.forEach(gex => { html += renderExerciseInner(gex, last); });
      html += `</div>`;
    } else {
      html += `<div class="exercise-block">${renderExerciseInner(ex, last)}</div>`;
      i++;
    }
  }

  // EMOM
  if (tmpl.emom) {
    html += renderEMOM(tmpl.emom);
  }
  // AMRAP
  if (tmpl.amrap) {
    html += renderAMRAP(tmpl.amrap);
  }

  container.innerHTML = html;
}

function renderExerciseInner(ex, lastSession) {
  const lastEx = lastSession?.exercises?.find(e => e.id === ex.id);
  const adjustedSets = state.readiness < 70 && state.readiness >= 55 ? Math.max(ex.sets - 1, 1) : ex.sets;

  let html = `
    <div class="eb-header" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.eb-notes')?.classList.toggle('hidden')">
      <div>
        <div class="eb-name">${ex.name}</div>
        <div class="eb-target">${adjustedSets} × ${ex.reps} ${ex.startWeight ? '· Start: ' + ex.startWeight + ' ' + ex.unit : ''}</div>
      </div>
      <span class="eb-badge" id="badge-${ex.id}"></span>
    </div>
    ${ex.notes ? `<div class="eb-notes">${ex.notes}</div>` : ''}
    <div class="eb-body">
      <div class="set-table">
        <div class="set-header">
          <div>SET</div><div>PREV</div><div>LBS</div><div>REPS</div><div></div>
        </div>
  `;

  for (let s = 0; s < adjustedSets; s++) {
    const key = `${ex.id}_${s}`;
    const prevSet = lastEx?.sets?.[s];
    const prevStr = prevSet ? `${prevSet.weight}×${prevSet.reps}` : '—';
    const defaultWeight = prevSet?.weight || ex.startWeight || '';
    const defaultReps = prevSet?.reps || ex.reps.replace(/[^0-9]/g, '') || '';
    const isHold = ex.isHold;

    html += `
      <div class="set-row" id="row-${key}">
        <div class="set-num" id="num-${key}">${s+1}</div>
        <div class="set-prev">${prevStr}</div>
        <input type="number" class="set-input" id="wt-${key}" placeholder="${defaultWeight}" 
          value="" inputmode="decimal" onfocus="this.select()"
          ${isHold ? 'style="opacity:0.3" disabled' : ''}>
        <input type="${isHold ? 'text' : 'number'}" class="set-input" id="reps-${key}" 
          placeholder="${isHold ? ex.reps : defaultReps}" value="" inputmode="${isHold ? 'text' : 'numeric'}"
          onfocus="this.select()">
        <button class="set-check" id="chk-${key}" onclick="logSet('${ex.id}',${s},'${ex.id}',${ex.rest || 0})">✓</button>
      </div>
    `;
  }

  html += `</div></div>`;
  return html;
}

function logSet(exId, setIdx, exerciseId, restTime) {
  const key = `${exId}_${setIdx}`;
  const wtEl = document.getElementById(`wt-${key}`);
  const repsEl = document.getElementById(`reps-${key}`);

  const weight = wtEl.value || wtEl.placeholder || '0';
  const reps = repsEl.value || repsEl.placeholder || '0';

  state.setData[key] = { weight: parseFloat(weight) || 0, reps: reps, logged: true, timestamp: Date.now() };

  // Visual updates
  document.getElementById(`row-${key}`).classList.add('logged');
  document.getElementById(`num-${key}`).classList.add('logged');
  const chk = document.getElementById(`chk-${key}`);
  chk.classList.add('checked');
  chk.textContent = '✓';
  if (wtEl.value === '') wtEl.value = weight;
  if (repsEl.value === '') repsEl.value = reps;
  wtEl.classList.add('filled');
  repsEl.classList.add('filled');

  // Update badge
  updateBadge(exId);

  // Start rest timer if > 0
  if (restTime > 0) {
    startRestTimer(restTime);
  }

  // Vibrate
  if (navigator.vibrate) navigator.vibrate(50);
}

function updateBadge(exId) {
  const tmpl = state.activeTemplate;
  const ex = tmpl.exercises.find(e => e.id === exId);
  if (!ex) return;
  const adjustedSets = state.readiness < 70 && state.readiness >= 55 ? Math.max(ex.sets - 1, 1) : ex.sets;
  let logged = 0;
  for (let s = 0; s < adjustedSets; s++) {
    if (state.setData[`${exId}_${s}`]?.logged) logged++;
  }
  const badge = document.getElementById(`badge-${exId}`);
  if (!badge) return;
  if (logged === adjustedSets) { badge.textContent = '✓ Done'; badge.className = 'eb-badge done'; }
  else if (logged > 0) { badge.textContent = `${logged}/${adjustedSets}`; badge.className = 'eb-badge partial'; }
}

// ============================================================
// REST TIMER
// ============================================================
function startRestTimer(seconds) {
  clearInterval(state.restTimer);
  state.restSeconds = seconds;
  state.restTarget = seconds;
  const bar = document.getElementById('rest-bar');
  bar.classList.add('visible');
  updateRestDisplay();

  state.restTimer = setInterval(() => {
    state.restSeconds--;
    updateRestDisplay();
    if (state.restSeconds <= 0) {
      clearInterval(state.restTimer);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
}

function updateRestDisplay() {
  const el = document.getElementById('rest-time');
  const s = Math.abs(state.restSeconds);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  const prefix = state.restSeconds < 0 ? '+' : '';
  el.textContent = `${prefix}${m}:${sec.toString().padStart(2,'0')}`;
  el.className = 'rest-time' + (state.restSeconds <= 0 ? ' done' : state.restSeconds <= 10 ? ' warning' : '');

  const pct = state.restTarget > 0 ? Math.max(0, (state.restSeconds / state.restTarget) * 100) : 0;
  document.getElementById('rest-fill').style.width = pct + '%';
  document.getElementById('rest-label').textContent = state.restSeconds <= 0 ? 'GO! Time\'s up' : 'Rest';
}

function skipRest() {
  clearInterval(state.restTimer);
  document.getElementById('rest-bar').classList.remove('visible');
}

function addRest(s) {
  state.restSeconds += s;
  state.restTarget += s;
}

// ============================================================
// EMOM TIMER
// ============================================================
function renderEMOM(emom) {
  const weekNum = getWeekNumber();
  const isA = weekNum % 2 === 1;
  const exercises = isA ? emom.weekA : emom.weekB;
  const label = isA ? 'A' : 'B';

  return `
    <div class="emom-container" id="emom-box">
      <div class="emom-title">⏱ EMOM FINISHER (8 min) — Week ${label}</div>
      <div class="emom-round" id="emom-round">Tap Start when ready</div>
      <div class="emom-time" id="emom-time">8:00</div>
      <div class="emom-exercise" id="emom-exercise">
        Odd min: ${exercises[0].reps} ${exercises[0].name}<br>
        Even min: ${exercises[1].reps} ${exercises[1].name}
      </div>
      <div>
        <button class="emom-btn start" id="emom-start" onclick="startEMOM()">▶ Start EMOM</button>
        <button class="emom-btn stop hidden" id="emom-stop" onclick="stopEMOM()">⏹ Stop</button>
        <button class="emom-btn reset hidden" id="emom-reset" onclick="resetEMOM()">↻ Reset</button>
      </div>
    </div>
  `;
}

function startEMOM() {
  const tmpl = state.activeTemplate;
  const weekNum = getWeekNumber();
  const isA = weekNum % 2 === 1;
  const exercises = isA ? tmpl.emom.weekA : tmpl.emom.weekB;

  state.emomState = { totalSeconds: 480, remaining: 480, exercises, running: true };
  document.getElementById('emom-start').classList.add('hidden');
  document.getElementById('emom-stop').classList.remove('hidden');
  document.getElementById('emom-reset').classList.remove('hidden');

  clearInterval(state.emomTimer);
  state.emomTimer = setInterval(() => {
    if (!state.emomState.running) return;
    state.emomState.remaining--;
    const r = state.emomState.remaining;
    const m = Math.floor(r / 60);
    const s = r % 60;
    document.getElementById('emom-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;

    const elapsed = 480 - r;
    const currentMin = Math.floor(elapsed / 60);
    const isOdd = currentMin % 2 === 0;
    const ex = isOdd ? exercises[0] : exercises[1];
    document.getElementById('emom-round').textContent = `Minute ${currentMin + 1} of 8 — ${isOdd ? 'ODD' : 'EVEN'}`;
    document.getElementById('emom-exercise').innerHTML = `<strong>${ex.reps} ${ex.name}</strong><br>${ex.detail}`;

    const secInMin = elapsed % 60;
    if (secInMin === 0 && elapsed > 0 && navigator.vibrate) navigator.vibrate(200);

    if (r <= 0) {
      clearInterval(state.emomTimer);
      document.getElementById('emom-round').textContent = 'DONE! 🎉';
      document.getElementById('emom-exercise').textContent = 'EMOM Complete';
      if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
    }
  }, 1000);
}

function stopEMOM() {
  if (state.emomState) state.emomState.running = false;
  clearInterval(state.emomTimer);
  document.getElementById('emom-stop').classList.add('hidden');
  document.getElementById('emom-start').classList.remove('hidden');
  document.getElementById('emom-start').textContent = '▶ Resume';
}

function resetEMOM() {
  clearInterval(state.emomTimer);
  state.emomState = null;
  document.getElementById('emom-time').textContent = '8:00';
  document.getElementById('emom-round').textContent = 'Tap Start when ready';
  document.getElementById('emom-start').classList.remove('hidden');
  document.getElementById('emom-start').textContent = '▶ Start EMOM';
  document.getElementById('emom-stop').classList.add('hidden');
  document.getElementById('emom-reset').classList.add('hidden');
}

// ============================================================
// AMRAP TIMER
// ============================================================
function renderAMRAP(amrap) {
  const exList = amrap.exercises.map(e => `${e.reps} ${e.name}`).join('<br>');
  return `
    <div class="amrap-container" id="amrap-box">
      <div class="amrap-title">🔥 AMRAP FINISHER (5 min)</div>
      <div class="amrap-time" id="amrap-time">5:00</div>
      <div class="amrap-exercises">${exList}<br><em style="color:var(--orange)">= 1 round. Go again immediately.</em></div>
      <div class="amrap-rounds">Rounds: <span id="amrap-rounds">0</span></div>
      <div>
        <button class="emom-btn start" id="amrap-start" onclick="startAMRAP()">▶ Start AMRAP</button>
        <button class="emom-btn stop hidden" id="amrap-stop-btn" onclick="stopAMRAP()">⏹ Stop</button>
      </div>
      <button class="amrap-round-btn hidden" id="amrap-round-btn" onclick="addAMRAPRound()">
        TAP FOR ROUND +1
      </button>
    </div>
  `;
}

function startAMRAP() {
  state.amrapState = { remaining: 300, rounds: 0, running: true };
  document.getElementById('amrap-start').classList.add('hidden');
  document.getElementById('amrap-stop-btn').classList.remove('hidden');
  document.getElementById('amrap-round-btn').classList.remove('hidden');

  clearInterval(state.amrapTimer);
  state.amrapTimer = setInterval(() => {
    if (!state.amrapState.running) return;
    state.amrapState.remaining--;
    const r = state.amrapState.remaining;
    const m = Math.floor(r / 60);
    const s = r % 60;
    document.getElementById('amrap-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;

    if (r <= 0) {
      clearInterval(state.amrapTimer);
      document.getElementById('amrap-time').textContent = 'TIME!';
      document.getElementById('amrap-round-btn').classList.add('hidden');
      if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
    }
  }, 1000);
}

function stopAMRAP() {
  if (state.amrapState) state.amrapState.running = false;
  clearInterval(state.amrapTimer);
}

function addAMRAPRound() {
  if (!state.amrapState) return;
  state.amrapState.rounds++;
  document.getElementById('amrap-rounds').textContent = state.amrapState.rounds;
  if (navigator.vibrate) navigator.vibrate(100);
}

// ============================================================
// FINISH & SUMMARY
// ============================================================
function confirmEnd() {
  if (confirm('End workout without saving?')) {
    cleanup();
    showScreen('home');
  }
}

function finishWorkout() {
  const tmpl = state.activeTemplate;
  const duration = Math.floor((Date.now() - state.startTime) / 1000);
  const h10Data = getH10SessionData();
  const session = buildSessionData(tmpl, duration, h10Data);

  // Save to localStorage
  const history = getHistory();
  history.unshift(session);
  if (history.length > 200) history.length = 200;
  saveHistory(history);

  // Render summary
  renderSummary(session);
  cleanup();
  showScreen('summary');

  // Push to Supabase
  syncSessionToSupabase(session);

  // Save H10 data to cardio_sessions
  if (h10Data) saveH10CardioSession(session, h10Data);

  resetH10Session();
}

function saveH10CardioSession(session, h10Data) {
  const row = {
    date_local:   session.dateLocal,
    source:       'polar',
    session_name: session.templateName,
    duration_min: Math.round(session.duration / 60),
    avg_hr:       h10Data.avg_hr,
    max_hr:       h10Data.max_hr,
    hrv_rmssd:    h10Data.hrv_rmssd,
  };
  fetch(`${SB_URL}/cardio_sessions`, {
    method: 'POST',
    headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(row),
  }).catch(e => console.error('H10 cardio save error:', e));
}

function buildSessionData(tmpl, duration, h10Data) {
  const exercises = [];
  tmpl.exercises.forEach(ex => {
    const adjustedSets = state.readiness < 70 && state.readiness >= 55 ? Math.max(ex.sets - 1, 1) : ex.sets;
    const sets = [];
    for (let s = 0; s < adjustedSets; s++) {
      const key = `${ex.id}_${s}`;
      const d = state.setData[key];
      if (d?.logged) {
        sets.push({ weight: d.weight, reps: d.reps, logged: true });
      }
    }
    if (sets.length > 0) {
      exercises.push({ id: ex.id, name: ex.name, sets, targetSets: adjustedSets, targetReps: ex.reps });
    }
  });

  return {
    templateId: tmpl.id,
    templateName: tmpl.name,
    date: new Date().toISOString(),
    dateLocal: new Date().toLocaleDateString('en-CA'),
    duration,
    readiness: state.readiness,
    exercises,
    emom: state.emomState ? { completed: state.emomState.remaining <= 0 } : null,
    amrap: state.amrapState ? { rounds: state.amrapState.rounds, duration: 300 } : null,
    totalSetsLogged: Object.values(state.setData).filter(s => s.logged).length,
    h10: h10Data || null,
  };
}

async function syncSessionToSupabase(session) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/workout_sessions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        date_local:        session.dateLocal,
        date_iso:          session.date,
        template_id:       session.templateId,
        template_name:     session.templateName,
        duration_seconds:  session.duration,
        readiness:         session.readiness,
        exercises:         session.exercises,
        emom:              session.emom,
        amrap:             session.amrap,
        total_sets_logged: session.totalSetsLogged,
      }),
    });
    if (!res.ok) {
      const body = await res.text();
      console.error('Supabase sync failed:', res.status, body);
    } else {
      showToast('Synced to cloud');
    }
  } catch (e) {
    console.error('Supabase sync error:', e);
  }
}

const SUPABASE_URL = 'https://wnwkraukvizulycjssyk.supabase.co';
const SUPABASE_KEY = 'sb_publishable__XnF9a593J_CgLzof3k-Mw_AA-jKpl6';

function renderSummary(session) {
  const m = Math.floor(session.duration / 60);
  document.getElementById('sum-duration').textContent = `${m} minutes · Readiness: ${session.readiness}`;

  let totalWeight = 0;
  let totalSets = session.totalSetsLogged;
  session.exercises.forEach(ex => {
    ex.sets.forEach(s => { totalWeight += (s.weight || 0) * (parseInt(s.reps) || 0); });
  });

  document.getElementById('sum-stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalSets}</div><div class="stat-label">Sets Logged</div></div>
    <div class="stat-card"><div class="stat-value">${session.exercises.length}</div><div class="stat-label">Exercises</div></div>
    <div class="stat-card"><div class="stat-value">${formatWeight(totalWeight)}</div><div class="stat-label">Total Volume</div></div>
  `;

  let exHtml = '<div class="se-title">EXERCISES</div>';
  session.exercises.forEach(ex => {
    const setsStr = ex.sets.map(s => `${s.weight}×${s.reps}`).join(', ');
    exHtml += `<div class="se-row"><span class="se-name">${ex.name}</span><span class="se-detail">${setsStr}</span></div>`;
  });
  if (session.amrap?.rounds) {
    exHtml += `<div class="se-row"><span class="se-name">🔥 AMRAP</span><span class="se-detail">${session.amrap.rounds} rounds</span></div>`;
  }
  if (session.emom?.completed) {
    exHtml += `<div class="se-row"><span class="se-name">⏱ EMOM</span><span class="se-detail">Completed</span></div>`;
  }
  document.getElementById('sum-exercises').innerHTML = exHtml;
}

function exportSession() {
  const history = getHistory();
  if (!history.length) return;
  const json = JSON.stringify(history[0], null, 2);
  const box = document.getElementById('sum-json');
  box.textContent = json;
  box.classList.remove('hidden');
  navigator.clipboard.writeText(json).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Shown below — long press to copy'));
}

function downloadSession() {
  const history = getHistory();
  if (!history.length) return;
  downloadJSON(history[0], `workout_${history[0].dateLocal}.json`);
}

function exportAll() {
  const history = getHistory();
  if (!history.length) { showToast('No workout history yet', true); return; }
  const data = { exported: new Date().toISOString(), totalSessions: history.length, sessions: history };
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => showToast(`Copied ${history.length} sessions!`)).catch(() => {
    downloadJSON(data, `all_workouts_${new Date().toISOString().slice(0,10)}.json`);
  });
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const history = getHistory();
  const container = document.getElementById('history-list');
  if (!history.length) { container.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;">No workouts yet.</p>'; return; }

  let html = '';
  history.forEach((s, idx) => {
    const m = Math.floor(s.duration / 60);
    html += `
      <div class="history-card" onclick="viewHistoryDetail(${idx})">
        <div class="hc-top">
          <div class="hc-name">${s.templateName}</div>
          <div class="hc-date">${formatDateShort(s.date)}</div>
        </div>
        <div class="hc-stats">
          <span>${m} min</span>
          <span>${s.totalSetsLogged} sets</span>
          <span>${s.exercises?.length || 0} exercises</span>
          <span>Readiness: ${s.readiness}</span>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function viewHistoryDetail(idx) {
  const session = getHistory()[idx];
  renderSummary(session);
  showScreen('summary');
}

// ============================================================
// UTILS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'home') renderHome();
  if (id === 'history') renderHistory();
}

function cleanup() {
  clearInterval(state.workoutTimer);
  clearInterval(state.restTimer);
  clearInterval(state.emomTimer);
  clearInterval(state.amrapTimer);
  skipRest();
  state.activeTemplate = null;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatWeight(w) {
  if (w >= 1000) return (w / 1000).toFixed(1) + 'k';
  return w.toLocaleString();
}

function getWeekNumber() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  return Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded!');
}

// Init
renderHome();
</script>
